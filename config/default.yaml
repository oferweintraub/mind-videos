# Hebrew Democracy Video Pipeline - Default Configuration
# API keys should be set in .env file, not here

llm:
  provider: claude
  claude_model: claude-sonnet-4-5-20250929
  gemini_model: gemini-3-flash-preview
  max_retries: 3
  timeout: 60

audio:
  provider: elevenlabs
  voice_id: EXAVITQu4vr4xnSDxMaL  # Jessica (Hebrew-capable)
  voice_name: Jessica
  model_id: eleven_v3  # Latest v3 model with better expressiveness
  language_code: he  # Hebrew
  stability: 0.5       # 0-1, lower = more expressive variation
  similarity_boost: 0.75
  style: 0.0           # 0-1, higher = more emotional intensity

  # Emotion preset (overrides stability/style when set)
  # Options: neutral, angry, disappointed, hopeful, determined,
  #          sad, excited, serious, sarcastic, empathetic, urgent, cynical
  # emotion: determined

video:
  primary_provider: fal
  fallback_provider: replicate
  resolution: 480p  # Options: 480p, 720p (720p is ~88% more expensive but better quality)
  max_retries: 3
  poll_interval: 5
  timeout: 300

  # Model identifiers
  veed_model: veed/fabric-1.0
  veed_replicate_model: veed/fabric-1.0
  kling_model: fal-ai/kling-video/v2.5/pro
  kling_replicate_model: klingai/kling-2.5-pro
  sync_model: fal-ai/sync-lipsync-2-pro
  sync_replicate_model: sync/lipsync-2-pro

transitions:
  # Default transition for scene changes
  default_type: fade      # Visual transition type (fade recommended for speech videos)
  default_duration: 0.5   # Duration in seconds for video fade

  # Transition for same-scene cuts (when same image is reused)
  same_scene_type: fade
  same_scene_duration: 0.3

  # Audio transition settings
  # audio_crossfade=false ensures speech never overlaps:
  # - Segment 1 plays fully (all speech), fades to black
  # - Brief silence gap (black screen)
  # - Segment 2 fades in, plays fully (all speech)
  audio_crossfade: false  # false = sequential mode, speech never overlaps (recommended)
  audio_gap: 0.5          # Silence gap between segments (seconds)
  audio_fade_duration: 0.15  # Video fade duration (audio stays full)
  audio_curve: exp        # Fade curve for audio crossfade mode only

audio_preprocessing:
  # Preprocessing for better lip-sync quality
  enabled: true
  normalize: true
  normalize_lufs: -16.0
  trim_silence: true
  sample_rate: 44100

image:
  provider: nano_banana
  model: imagen-4.0-generate-001
  aspect_ratio: "9:16"
  number_of_images: 1

subtitle:
  font: Arial
  font_size: 24
  font_color: white
  background_color: "black@0.5"
  position: bottom
  margin_v: 20

pipeline:
  default_workflow: 1
  segments_min: 3
  segments_max: 5
  segment_duration_min: 10.0
  segment_duration_max: 20.0
  preview_segments: 4
  quality_threshold: 0.7
  max_remake_attempts: 2

output_dir: output
config_dir: config
