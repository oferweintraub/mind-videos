# ElevenLabs voice catalog — used by /new-character to suggest voices.
#
# All entries below are stock ElevenLabs voices (no clone needed).
# Hebrew TTS is driven via `model_id: eleven_v3` + `language_code: 'he'`.
# The English-language tone descriptions below carry over reasonably well to
# Hebrew prosody, but the *accent* will be neutral Hebrew (the language code
# overrides the voice's native English accent).
#
# Voice IDs are stable. To browse more, see https://elevenlabs.io/voice-library
# and copy the ID into a character manifest's `voice.voice_id`.

voices:
